name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  terraform:
    name: Terraform format + validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
      - run: tofu fmt -check -recursive terraform/
      - run: cd terraform && tofu init -backend=false
      - run: cd terraform && tofu validate

  ruff:
    name: Ruff lint + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: cd config && uv sync --group dev
      - run: cd config && uv run ruff check .
      - run: cd config && uv run ruff format --check .

