name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  terraform:
    name: Terraform format + validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
      - run: tofu fmt -check -recursive terraform/
      - run: cd terraform && tofu init -backend=false
      - run: cd terraform && tofu validate

  pyinfra:
    name: PyInfra dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: cd config && uv sync
      - run: cd config && POSTGRES_DB_PASSWORD=dummy uv run pyinfra @local deploy.py --dry

